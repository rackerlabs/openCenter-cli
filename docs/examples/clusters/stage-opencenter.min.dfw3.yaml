opencenter:
    cluster:
        cluster_name: opencenter.stage.dfw3
        k8s_api_port_acl:
            - "0.0.0.0/0"
        kubernetes:
            dns_zone_name: "stage.opencenter.dev"
            loadbalancer_provider: "amphora"
        ssh_authorized_keys:
            - "ssh-rsa ..."
    gitops:
        git_dir: ./testdata/local-git-repo-opencenter-stage-dfw3
    infrastructure:
        cloud:
            openstack:
                auth_url: "https://keystone.api.dfw3.rackspacecloud.com/v3/"
                region: "DFW3"
        provider: openstack
    services:
        cert-manager:
            email: mpk-support@rackspace.com
            enabled: true
        weave-gitops:
            enabled: false
secrets:
    sops_age_key_file: ./testdata/config/sops/age/keys/opencenter-dfw3-key.txt
iac:
    main:
        cluster_name: "opencenter.stage.dfw3"
        openstack_auth_url: "https://keystone.api.dfw3.rackspacecloud.com/v3/"
        openstack_region: "DFW3"
        openstack_tenant_name: "33d34083-XXXX-XXXX-XXXX-XXXXXXXXXXXX"
        router_external_network_id: "82be3711-XXXX-XXXX-XXXX-XXXXXXXXXXXX"
        subnet_nodes: "10.0.8.0/22"
        allocation_pool_end: "10.0.11.254"
        dns_zone_name: "stage.opencenter.dev"
        image_id: "ec458631-309a-4b7d-846c-cd2ccc601137"
        k8s_api_port_acl: ["0.0.0.0/0"]
        ssh_authorized_keys: ["ssh-rsa ..."]
        kubernetes_version: "1.32.8"
        worker_node_bfv_volume_type: "Performance"
    modules:
        openstack-nova:
            source: "github.com/rackerlabs/openCenter-gitops-base.git//iac/cloud/openstack/openstack-nova?ref=main"
        kubespray-cluster:
            source: "github.com/rackerlabs/openCenter-gitops-base.git//iac/provider/kubespray?ref=main"
        calico:
            source: "github.com/rackerlabs/openCenter-gitops-base.git//iac/cni/calico?ref=main"
networking:
    vrrp_ip: "10.0.8.10"
