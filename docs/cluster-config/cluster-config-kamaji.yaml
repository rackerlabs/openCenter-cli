---
# OpenCenter Unified Configuration - Kamaji Hosted Control Plane Example
# Schema Version: 2.0
#
# This example demonstrates a Kamaji-based deployment with:
# - Hosted control plane running in a management cluster
# - Cluster API (CAPI) for worker node provisioning
# - Mixed worker OS support: Ubuntu, Windows, and Talos
# - OpenStack infrastructure provider

schema_version: "2.0"

metadata:
  created_at: "2026-01-22T10:00:00Z"
  updated_at: "2026-01-22T10:00:00Z"
  created_by: "admin@acme.com"
  schema_version: "2.0"
  stages:
    init: "success"
    preflight: "success"
    setup: "pending"
    bootstrap: "pending"

opencenter:
  #############################################################################
  # META - Cluster Identity
  #############################################################################
  meta:
    name: "tenant-cluster-01"
    organization: "acme-corp"
    env: "production"
    region: "sjc3"
    status: ""

  #############################################################################
  # SECRETS BACKEND - Barbican Configuration
  #############################################################################
  secrets:
    backend: "barbican"
    barbican:
      auth_url: "https://identity.sjc3.rackspacecloud.com/v3"
      project_id: ""
      region: "SJC3"
      user_domain_name: "rackspace_cloud_domain"
      project_domain_name: "rackspace_cloud_domain"
      ca_cert: ""

  #############################################################################
  # INFRASTRUCTURE - Provider Configuration
  #############################################################################
  infrastructure:
    provider: "openstack"
    
    # SSH configuration
    ssh:
      user: "ubuntu"
      key_path: ""
      authorized_keys:
        - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI... admin@acme.com"
    
    os_version: "24"
    server_group_affinity: ["anti-affinity"]
    k8s_api_ip: ""  # Managed by Kamaji, not needed for tenant cluster
    
    node_naming:
      worker: "wn"
      master: "cp"  # Not used in Kamaji (control plane is hosted)
      worker_windows: "win"
    
    bastion:
      address: "localhost"
    
    # Compute configuration (worker nodes only, no masters in Kamaji)
    compute:
      # Instance flavors
      flavor_bastion: "gp.0.2.2"
      flavor_master: ""  # Not used in Kamaji
      flavor_worker: "gp.0.4.16"
      flavor_worker_windows: "gp.5.4.16"
      
      # Node counts (no masters in Kamaji)
      master_count: 0  # Control plane is hosted
      worker_count: 0  # Workers defined in deployment.kamaji.worker_pools
      worker_count_windows: 0
      
      # Additional worker pools not used in Kamaji
      # Worker pools are defined in deployment.kamaji.worker_pools instead
      additional_server_pools_worker: []
    
    # Storage configuration
    storage:
      default_storage_class: "csi-cinder-sc-delete"
      
      # Worker boot volume configuration
      worker_volume_size: 100
      worker_volume_destination_type: "volume"
      worker_volume_source_type: "image"
      worker_volume_type: "HA-Standard"
      worker_volume_delete_on_termination: true
      
      # Master boot volume (not used in Kamaji)
      master_volume_size: 0
      
      # Bastion boot volume
      bastion_volume_size: 40
      bastion_volume_destination_type: "volume"
      bastion_volume_source_type: "image"
      bastion_volume_type: "HA-Standard"
      
      # Additional block devices
      additional_block_devices: []
    
    # Networking configuration
    networking:
      # Network topology
      subnet_nodes: "10.2.128.0/22"
      allocation_pool_start: "10.2.128.100"
      allocation_pool_end: "10.2.128.200"
      
      # High availability (managed by Kamaji for control plane)
      vrrp_ip: ""  # Not used in Kamaji
      vrrp_enabled: false
      
      # Load balancing
      use_octavia: true
      loadbalancer_provider: "octavia"
      
      # DNS
      use_designate: true
      dns_zone_name: "k8s.acme.com"
      dns_nameservers:
        - "8.8.8.8"
        - "8.8.4.4"
      
      # Time synchronization
      ntp_servers:
        - "time.sjc3.rackspace.com"
        - "time2.sjc3.rackspace.com"
      
      # Security
      security:
        ca_certificates: ""
        os_hardening: true
      
      # VLAN
      vlan:
        id: "100"
        mtu: 1500
        provider: "physnet1"
    
    cloud:
      openstack:
        auth_url: "https://identity.sjc3.rackspacecloud.com/v3"
        insecure: false
        region: "SJC3"
        application_credential_id: ""
        application_credential_secret: ""
        domain: ""
        tenant_name: "production"
        availability_zone: "az1"
        project_domain_name: "rackspace_cloud_domain"
        user_domain_name: "rackspace_cloud_domain"
        ca: ""
        image_id: "799dcf97-3656-4361-8187-13ab1b295e33"  # Ubuntu 24.04
        image_id_windows: "a2083759-f341-445b-b717-dafb5e31fa6b"  # Windows Server 2022
        
        networking:
          floating_ip_pool: "PUBLICNET"
          floating_network_id: ""
          network_id: ""
          router_external_network_id: "723f8fa2-dbf7-4cec-8d5f-017e62c12f79"
          subnet_id: ""
          k8s_api_port_acl: ["10.0.0.0/8", "192.168.0.0/16"]
          
          designate:
            dns_zone_name: "k8s.acme.com"
          
          vlan:
            id: "100"
            mtu: 1500
            provider: "physnet1"
        
        modules:
          openstack_nova:
            source: "github.com/rackerlabs/opencenter-gitops-base.git//iac/cloud/openstack/openstack-nova?ref=main"

  #############################################################################
  # CLUSTER - Kubernetes Configuration
  #############################################################################
  cluster:
    cluster_name: "tenant-cluster-01"
    base_domain: "k8s.acme.com"
    cluster_fqdn: "tenant-cluster-01.sjc3.k8s.acme.com"
    admin_email: "platform-team@acme.com"
    
    kubernetes:
      version: "1.33.5"
      api_port: 6443
      kube_vip_enabled: false  # Not used in Kamaji
      kubelet_rotate_server_certificates: false
      
      # Kubernetes networking (CNI-managed)
      subnet_pods: "10.42.0.0/16"
      subnet_services: "10.43.0.0/16"
      
      # CNI configuration
      network_plugin:
        calico:
          enabled: true
          cni_iface: "enp3s0"
          calico_interface_autodetect: "interface"
          autodetect_cidr: ""
          encapsulation_type: "VXLAN"
          nat_outgoing: true
          modules:
            calico:
              source: "github.com/rackerlabs/opencenter-gitops-base.git//iac/cni/calico?ref=main"
        cilium:
          enabled: false
        kube-ovn:
          enabled: false
      
      # Security
      security:
        k8s_hardening: true
        pod_security_exemptions:
          - "trivy-temp"
          - "tigera-operator"
          - "kube-system"
      
      # OIDC
      oidc:
        enabled: true
        kube_oidc_url: "https://auth.tenant-cluster-01.sjc3.k8s.acme.com/realms/opencenter"
        kube_oidc_client_id: "kubernetes"
        kube_oidc_ca_file: ""
        kube_oidc_username_claim: "sub"
        kube_oidc_username_prefix: "oidc:"
        kube_oidc_groups_claim: "groups"
        kube_oidc_groups_prefix: "oidc:"
      
      # Windows workers
      windows_workers:
        enabled: false

  #############################################################################
  # DEPLOYMENT - Kamaji Hosted Control Plane Configuration
  #############################################################################
  deployment:
    method: "kamaji"
    
    # Kamaji - Hosted Control Plane with Cluster API
    kamaji:
      enabled: true
      version: "v1.0.0"
      
      # Control plane configuration (runs in management cluster)
      control_plane:
        # Number of control plane replicas (for HA)
        replicas: 3
        
        # Datastore backend for etcd data
        datastore: "etcd"  # etcd | postgresql | mysql
        
        # Etcd configuration (when datastore: etcd)
        etcd:
          storage_class: "csi-cinder-sc-delete"
          storage_size: "10Gi"
          # Etcd runs as StatefulSet in management cluster
        
        # PostgreSQL configuration (alternative to etcd)
        # postgresql:
        #   host: "postgres.management-cluster.svc.cluster.local"
        #   port: 5432
        #   database: "kamaji"
        #   ssl_mode: "require"
        #   # Credentials from secrets.kamaji.postgresql_*
        
        # Control plane endpoint configuration
        service_type: "LoadBalancer"  # LoadBalancer | NodePort
        api_server_port: 6443
        
        # Resource requests/limits for control plane pods
        resources:
          api_server:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          controller_manager:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          scheduler:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      
      # Cluster API configuration
      cluster_api:
        version: "v1.6.0"
        
        # CAPI providers
        providers:
          infrastructure: "openstack"  # openstack | aws | azure | vsphere | metal3
          bootstrap: "kubeadm"  # kubeadm | talos
          control_plane: "kubeadm"  # kubeadm | talos (not used with Kamaji)
        
        # Infrastructure provider configuration
        openstack:
          # References infrastructure.cloud.openstack for credentials
          cloud_name: "openstack"
          dns_nameservers: ["8.8.8.8", "8.8.4.4"]
          external_network_id: "723f8fa2-dbf7-4cec-8d5f-017e62c12f79"
          
          # Machine template defaults
          machine_template:
            image_name: "ubuntu-24.04-k8s"
            ssh_key_name: "tenant-cluster-01-key"
      
      # Worker node pools (mixed OS support via CAPI)
      worker_pools:
        # Ubuntu workers via kubeadm bootstrap
        - name: "ubuntu-workers"
          os: "ubuntu"
          count: 3
          flavor: "gp.0.4.16"
          image: "ubuntu-24.04-k8s"
          bootstrap_provider: "kubeadm"
          
          # Boot volume configuration
          boot_volume:
            size: 100
            type: "HA-Standard"
            delete_on_termination: true
          
          # Additional data volumes
          additional_volumes: []
          
          # Node labels and taints
          labels:
            node-role.kubernetes.io/worker: ""
            workload-type: "general"
          taints: []
          
          # Autoscaling (optional)
          autoscaling:
            enabled: false
            min_replicas: 3
            max_replicas: 10
        
        # Windows workers via kubeadm bootstrap
        - name: "windows-workers"
          os: "windows"
          count: 2
          flavor: "gp.5.4.16"
          image: "windows-2022-k8s"
          bootstrap_provider: "kubeadm"
          
          boot_volume:
            size: 150
            type: "HA-Standard"
            delete_on_termination: true
          
          additional_volumes:
            - device_name: "/dev/sdb"
              size: 200
              type: "HA-Performance"
              delete_on_termination: false
          
          labels:
            node-role.kubernetes.io/worker: ""
            kubernetes.io/os: "windows"
            workload-type: "windows"
          taints:
            - key: "os"
              value: "windows"
              effect: "NoSchedule"
          
          autoscaling:
            enabled: false
        
        # Talos workers via talos bootstrap
        - name: "talos-workers"
          os: "talos"
          count: 3
          flavor: "gp.0.4.16"
          image: "talos-v1.8.0"
          bootstrap_provider: "talos"
          talos_version: "v1.8.0"
          
          boot_volume:
            size: 100
            type: "HA-Performance"
            delete_on_termination: true
          
          additional_volumes:
            - device_name: "/dev/vdb"
              size: 500
              type: "HA-Performance"
              delete_on_termination: false
          
          labels:
            node-role.kubernetes.io/worker: ""
            workload-type: "secure"
          taints: []
          
          # Talos-specific configuration
          talos_config:
            machine_config:
              app_armor_enabled: true
              seccomp_enabled: true
              disk_encryption: true
            security_config:
              vtpm_enabled: true
              image_verification: true
          
          autoscaling:
            enabled: true
            min_replicas: 3
            max_replicas: 10
        
        # High-memory workers for data processing
        - name: "high-memory-workers"
          os: "ubuntu"
          count: 2
          flavor: "gp.0.8.64"
          image: "ubuntu-24.04-k8s"
          bootstrap_provider: "kubeadm"
          
          boot_volume:
            size: 200
            type: "HA-Performance"
            delete_on_termination: true
          
          additional_volumes:
            - device_name: "/dev/vdb"
              size: 1000
              type: "HA-Performance"
              delete_on_termination: false
          
          labels:
            node-role.kubernetes.io/worker: ""
            workload-type: "memory-intensive"
          taints:
            - key: "workload"
              value: "memory-intensive"
              effect: "NoSchedule"
          
          autoscaling:
            enabled: true
            min_replicas: 2
            max_replicas: 8
      
      # GitOps modules for Kamaji deployment
      modules:
        kamaji:
          source: "github.com/rackerlabs/opencenter-gitops-base.git//iac/deployment/kamaji?ref=main"
        cluster_api:
          source: "github.com/rackerlabs/opencenter-gitops-base.git//iac/deployment/cluster-api?ref=main"
        cluster_api_provider_openstack:
          source: "github.com/rackerlabs/opencenter-gitops-base.git//iac/deployment/cluster-api/providers/openstack?ref=main"

  #############################################################################
  # GITOPS - Repository Configuration
  #############################################################################
  gitops:
    git_dir: "/home/admin/gitops/tenant-cluster-01"
    git_url: "git@github.com:acme-corp/k8s-gitops.git"
    git_ssh_key: ""
    git_ssh_pub: ""
    git_branch: "main"
    gitops_base_repo: "ssh://git@github.com/rackerlabs/opencenter-gitops-base.git"
    gitops_base_release: "v0.1.0"
    gitops_branch: "main"
    flux:
      interval: "15m"
      prune: true

  #############################################################################
  # MANAGED SERVICES - External/Vendor-Managed
  #############################################################################
  managed_services:
    alert-proxy:
      enabled: true
      image_repository: "ghcr.io/rackerlabs/alert-proxy"
      image_tag: "v1.2.0"
      gitops_source_repo: "ssh://git@github.com/rackerlabs/opencenter-gitops-base.git"
      gitops_source_release: "v0.1.0"
      gitops_source_branch: "main"
      alert_manager_base_url: "https://alertmanager.tenant-cluster-01.sjc3.k8s.acme.com"
      http_route_fqdn: "https://alerts.tenant-cluster-01.sjc3.k8s.acme.com"

  #############################################################################
  # SERVICES - Self-Hosted Platform Services
  #############################################################################
  services:
    # CNI
    calico:
      enabled: true
      calico_kube_api_server: "https://api.tenant-cluster-01.sjc3.k8s.acme.com:6443"
    
    # Certificate Management
    cert-manager:
      enabled: true
      email: "platform-team@acme.com"
      region: "us-east-1"
      letsencrypt_server: "https://acme-v02.api.letsencrypt.org/directory"
    
    # Core Infrastructure
    external-snapshotter:
      enabled: true
    fluxcd:
      enabled: true
    gateway:
      enabled: true
    gateway-api:
      enabled: true
    
    # Dashboard
    headlamp:
      enabled: true
      hostname: "dashboard.tenant-cluster-01.sjc3.k8s.acme.com"
      oidc_issuer_url: "https://auth.tenant-cluster-01.sjc3.k8s.acme.com/realms/opencenter"
      oidc_client_id: "kubernetes"
    
    # Identity
    keycloak:
      enabled: true
      hostname: "auth.tenant-cluster-01.sjc3.k8s.acme.com"
      realm: "opencenter"
      client_id: "kubernetes"
      frontend_url: "https://auth.tenant-cluster-01.sjc3.k8s.acme.com"
    
    # Monitoring
    kube-prometheus-stack:
      enabled: true
      prometheus_volume_size: 100
      prometheus_storage_class: "csi-cinder-sc-delete"
      grafana_volume_size: 20
      grafana_storage_class: "csi-cinder-sc-delete"
      alertmanager_volume_size: 10
      alertmanager_storage_class: "csi-cinder-sc-delete"
      webhook_url: "https://alerts.tenant-cluster-01.sjc3.k8s.acme.com/webhook"
    
    # Policy
    kyverno:
      enabled: true
    
    # Logging
    loki:
      enabled: true
      namespace: "monitoring"
      loki_storage_type: "swift"
      loki_bucket_name: "tenant-cluster-01-loki"
      loki_volume_size: 50
      loki_storage_class: "csi-cinder-sc-delete"
      swift_auth_url: "https://keystone.api.sjc3.rackspacecloud.com/v3/"
      swift_region: "SJC3"
      swift_auth_version: 3
      swift_application_credential_id: ""
      swift_container_name: "tenant-cluster-01-loki"
      swift_user_domain_name: "rackspace_cloud_domain"
      swift_domain_name: "Default"
    
    # Operators
    olm:
      enabled: true
    openstack-ccm:
      enabled: true
    openstack-csi:
      enabled: true
    postgres-operator:
      enabled: true
    rbac-manager:
      enabled: true
    sources:
      enabled: true
    
    # Tracing
    tempo:
      enabled: true
      storage_type: "swift"
      bucket_name: "tenant-cluster-01-tempo"
      volume_size: 20
      storage_class: "csi-cinder-sc-delete"
      swift_auth_url: "https://keystone.api.sjc3.rackspacecloud.com/v3/"
      swift_region: "SJC3"
    
    # Backup
    velero:
      enabled: true
      velero_backup_bucket: "tenant-cluster-01-backups"
      velero_region: "SJC3"
    
    # GitOps UI
    weave-gitops:
      enabled: true
      hostname: "gitops.tenant-cluster-01.sjc3.k8s.acme.com"

#############################################################################
# OPENTOFU - Infrastructure as Code Backend
#############################################################################
opentofu:
  enabled: true
  path: "opentofu"
  backend:
    type: "s3"
    local:
      path: ""
    s3:
      bucket: "acme-terraform-state"
      key: "tenant-cluster-01/terraform.tfstate"
      region: "us-east-1"

#############################################################################
# DEPLOYMENT - Auto-deploy Settings
#############################################################################
deployment:
  auto_deploy: false

#############################################################################
# SECRETS - Credentials (SOPS Encrypted in Production)
#############################################################################
secrets:
  sops_age_key_file: "/home/admin/.config/opencenter/clusters/acme-corp/secrets/age/tenant-cluster-01-key.txt"
  
  ssh_key:
    private: "/home/admin/.config/opencenter/clusters/acme-corp/secrets/ssh/tenant-cluster-01"
    public: "/home/admin/.config/opencenter/clusters/acme-corp/secrets/ssh/tenant-cluster-01.pub"
    cypher: "ed25519"
  
  global:
    aws:
      infrastructure:
        access_key: "AKIAIOSFODNN7EXAMPLE"
        secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
        region: "us-east-1"
      application:
        access_key: ""
        secret_access_key: ""
        region: ""
  
  # Kamaji-specific secrets
  kamaji:
    # PostgreSQL datastore credentials (if using postgresql)
    postgresql_username: "kamaji"
    postgresql_password: "secure-postgres-password"
    
    # Management cluster kubeconfig (for Kamaji controller)
    management_cluster_kubeconfig: "/path/to/management-cluster-kubeconfig"
  
  # Cluster API provider secrets
  cluster_api:
    openstack:
      # OpenStack credentials for CAPI provider
      clouds_yaml: |
        clouds:
          openstack:
            auth:
              auth_url: https://identity.sjc3.rackspacecloud.com/v3
              application_credential_id: "app-cred-id"
              application_credential_secret: "app-cred-secret"
            region_name: SJC3
  
  cert_manager:
    aws_access_key: "AKIAIOSFODNN7EXAMPLE"
    aws_secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
  
  loki:
    swift_password: "swift-application-credential-secret"
  
  keycloak:
    client_secret: "keycloak-client-secret-uuid"
    admin_password: "secure-admin-password"
  
  headlamp:
    oidc_client_secret: "headlamp-oidc-secret"
  
  weave_gitops:
    password: "gitops-admin-password"
    password_hash: "$2a$10$..."
  
  grafana:
    admin_password: "grafana-admin-password"
  
  tempo:
    access_key: "tempo-swift-credential-id"
    secret_key: "tempo-swift-credential-secret"
  
  alert_proxy:
    core_device_id: "device-uuid"
    account_service_token: "service-token"
    core_account_number: "123456"
