---
# OpenCenter Unified Configuration - Production Example
# Schema Version: 2.0

schema_version: "2.0"

metadata:
  created_at: "2026-01-22T10:00:00Z"
  updated_at: "2026-01-22T10:00:00Z"
  created_by: "admin@acme.com"
  schema_version: "2.0"
  stages:
    init: "success"
    preflight: "success"
    setup: "pending"
    bootstrap: "pending"

opencenter:
  #############################################################################
  # META - Cluster Identity
  #############################################################################
  meta:
    name: "prod-cluster"
    organization: "acme-corp"
    env: "production"
    region: "sjc3"
    status: ""

  #############################################################################
  # SECRETS BACKEND - Barbican Configuration
  #############################################################################
  secrets:
    backend: "barbican"
    barbican:
      auth_url: "https://identity.sjc3.rackspacecloud.com/v3"
      project_id: ""
      region: "SJC3"
      user_domain_name: "rackspace_cloud_domain"
      project_domain_name: "rackspace_cloud_domain"
      ca_cert: ""

  #############################################################################
  # INFRASTRUCTURE - Provider Configuration
  #############################################################################
  infrastructure:
    provider: "openstack"
    
    # SSH configuration
    ssh:
      user: "ubuntu"
      key_path: ""
      authorized_keys:
        - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI... admin@acme.com"
    
    os_version: "24"
    server_group_affinity: ["anti-affinity"]
    k8s_api_ip: ""
    
    node_naming:
      worker: "wn"
      master: "cp"
      worker_windows: "win"
    
    bastion:
      address: "localhost"
    
    # Compute configuration (instance types and node counts)
    compute:
      # Instance flavors (provider-specific instance types)
      flavor_bastion: "gp.0.2.2"
      flavor_master: "gp.0.4.8"
      flavor_worker: "gp.0.4.16"
      flavor_worker_windows: "gp.5.4.16"
      
      # Node counts
      master_count: 3
      worker_count: 5
      worker_count_windows: 0
      
      # Additional worker pools with custom configurations
      # Each pool can override flavors, storage, and node counts
      additional_server_pools_worker:
        - name: "high-memory"
          worker_count: 2
          flavor_worker: "gp.0.8.64"
          node_worker: "mem"
          server_group_affinity: "anti-affinity"
          image_id: "799dcf97-3656-4361-8187-13ab1b295e33"
          
          # Override boot volume configuration for this pool
          worker_node_bfv_volume_size: 200
          worker_node_bfv_destination_type: "volume"
          worker_node_bfv_source_type: "image"
          worker_node_bfv_volume_type: "HA-Performance"
          worker_node_bfv_delete_on_termination: true
          
          # Additional data volumes for this pool
          additional_block_devices_worker:
            - device_name: "/dev/vdb"
              volume_size: 1000
              volume_type: "HA-Performance"
              delete_on_termination: false
        
        - name: "gpu-workers"
          worker_count: 2
          flavor_worker: "gpu.0.8.32"
          node_worker: "gpu"
          server_group_affinity: "anti-affinity"
          image_id: "799dcf97-3656-4361-8187-13ab1b295e33"
          
          # GPU workers with larger boot volume
          worker_node_bfv_volume_size: 300
          worker_node_bfv_volume_type: "HA-Performance"
          
          # Multiple data volumes for GPU workloads
          additional_block_devices_worker:
            - device_name: "/dev/vdb"
              volume_size: 500
              volume_type: "HA-Performance"
              delete_on_termination: false
            - device_name: "/dev/vdc"
              volume_size: 2000
              volume_type: "HA-Performance"
              delete_on_termination: false
    
    # Storage configuration (boot volumes, additional devices)
    storage:
      default_storage_class: "csi-cinder-sc-delete"
      
      # Default worker boot volume configuration
      worker_volume_size: 100
      worker_volume_destination_type: "volume"
      worker_volume_source_type: "image"
      worker_volume_type: "HA-Standard"
      worker_volume_delete_on_termination: true
      
      # Master boot volume configuration
      master_volume_size: 100
      master_volume_destination_type: "volume"
      master_volume_source_type: "image"
      master_volume_type: "HA-Standard"
      master_volume_delete_on_termination: true
      
      # Bastion boot volume configuration
      bastion_volume_size: 40
      bastion_volume_destination_type: "volume"
      bastion_volume_source_type: "image"
      bastion_volume_type: "HA-Standard"
      
      # Additional block devices (data volumes) - applied to all workers by default
      additional_block_devices: []
      # Example:
      # - device_name: "/dev/vdb"
      #   volume_size: 500
      #   volume_type: "HA-Performance"
      #   delete_on_termination: false
    
    # Networking configuration (infrastructure-level)
    networking:
      # Network topology
      subnet_nodes: "10.2.128.0/22"
      allocation_pool_start: "10.2.128.100"
      allocation_pool_end: "10.2.128.200"
      
      # High availability
      vrrp_ip: "10.2.128.10"
      vrrp_enabled: true
      
      # Load balancing
      use_octavia: false
      loadbalancer_provider: "ovn"
      
      # DNS
      use_designate: true
      dns_zone_name: "k8s.acme.com"
      dns_nameservers:
        - "8.8.8.8"
        - "8.8.4.4"
      
      # Time synchronization
      ntp_servers:
        - "time.sjc3.rackspace.com"
        - "time2.sjc3.rackspace.com"
      
      # Security
      security:
        ca_certificates: ""
        os_hardening: true
      
      # VLAN
      vlan:
        id: "100"
        mtu: 1500
        provider: "physnet1"
    
    cloud:
      openstack:
        auth_url: "https://identity.sjc3.rackspacecloud.com/v3"
        insecure: false
        region: "SJC3"
        application_credential_id: ""
        application_credential_secret: ""
        domain: ""
        tenant_name: "production"
        availability_zone: "az1"
        project_domain_name: "rackspace_cloud_domain"
        user_domain_name: "rackspace_cloud_domain"
        ca: ""
        image_id: "799dcf97-3656-4361-8187-13ab1b295e33"
        image_id_windows: "a2083759-f341-445b-b717-dafb5e31fa6b"
        
        networking:
          floating_ip_pool: "PUBLICNET"
          floating_network_id: ""
          network_id: ""
          router_external_network_id: "723f8fa2-dbf7-4cec-8d5f-017e62c12f79"
          subnet_id: ""
          k8s_api_port_acl: ["10.0.0.0/8", "192.168.0.0/16"]
          
          designate:
            dns_zone_name: "k8s.acme.com"
          
          vlan:
            id: "100"
            mtu: 1500
            provider: "physnet1"
        
        modules:
          openstack_nova:
            source: "github.com/rackerlabs/opencenter-gitops-base.git//iac/cloud/openstack/openstack-nova?ref=main"
      
      aws:
        profile: ""
        region: ""
        vpc_id: ""
        private_subnets: []
        public_subnets: []

  #############################################################################
  # CLUSTER - Kubernetes Configuration
  #############################################################################
  cluster:
    cluster_name: "prod-cluster"
    base_domain: "k8s.acme.com"
    cluster_fqdn: "prod-cluster.sjc3.k8s.acme.com"
    admin_email: "platform-team@acme.com"
    
    kubernetes:
      version: "1.33.5"
      api_port: 443
      kube_vip_enabled: true
      kubelet_rotate_server_certificates: false
      
      # Kubernetes networking (CNI-managed)
      subnet_pods: "10.42.0.0/16"
      subnet_services: "10.43.0.0/16"
      
      # CNI configuration
      network_plugin:
        calico:
          enabled: true
          cni_iface: "enp3s0"
          calico_interface_autodetect: "interface"
          autodetect_cidr: ""
          encapsulation_type: "VXLAN"
          nat_outgoing: true
          modules:
            calico:
              source: "github.com/rackerlabs/opencenter-gitops-base.git//iac/cni/calico?ref=main"
        cilium:
          enabled: false
          operator_enabled: true
          kubeProxyReplacement: true
        kube-ovn:
          enabled: false
          cilium_integration: true
      
      # Security
      security:
        k8s_hardening: true
        pod_security_exemptions:
          - "trivy-temp"
          - "tigera-operator"
          - "kube-system"
      
      # OIDC
      oidc:
        enabled: true
        kube_oidc_url: "https://auth.prod-cluster.sjc3.k8s.acme.com/realms/opencenter"
        kube_oidc_client_id: "kubernetes"
        kube_oidc_ca_file: ""
        kube_oidc_username_claim: "sub"
        kube_oidc_username_prefix: "oidc:"
        kube_oidc_groups_claim: "groups"
        kube_oidc_groups_prefix: "oidc:"
      
      # Windows workers (disabled)
      windows_workers:
        enabled: false

  #############################################################################
  # DEPLOYMENT - Deployment Method Configuration
  #############################################################################
  deployment:
    method: "kubespray"    # kubespray | talos | kamaji | eks | gke | aks
    
    kubespray:
      version: "v2.29.1"
      modules:
        kubespray_cluster:
          source: "github.com/rackerlabs/opencenter-gitops-base.git//iac/provider/kubespray?ref=main"
    
    # Kamaji - Hosted Control Plane (disabled in this example)
    # See cluster-config-kamaji.yaml for a complete Kamaji deployment example
    kamaji:
      enabled: false
      version: "v1.0.0"
      
      control_plane:
        replicas: 3
        datastore: "etcd"
        
        etcd:
          storage_class: "csi-cinder-sc-delete"
          storage_size: "10Gi"
        
        service_type: "LoadBalancer"
        api_server_port: 6443
      
      cluster_api:
        version: "v1.6.0"
        providers:
          infrastructure: "openstack"
          bootstrap: "kubeadm"
          control_plane: "kubeadm"
      
      worker_pools: []
      
      modules:
        kamaji:
          source: "github.com/rackerlabs/opencenter-gitops-base.git//iac/deployment/kamaji?ref=main"
        cluster_api:
          source: "github.com/rackerlabs/opencenter-gitops-base.git//iac/deployment/cluster-api?ref=main"

  #############################################################################
  # GITOPS - Repository Configuration
  #############################################################################
  gitops:
    git_dir: "/home/admin/gitops/prod-cluster"
    git_url: "git@github.com:acme-corp/k8s-gitops.git"
    git_ssh_key: ""
    git_ssh_pub: ""
    git_branch: "main"
    gitops_base_repo: "ssh://git@github.com/rackerlabs/opencenter-gitops-base.git"
    gitops_base_release: "v0.1.0"
    gitops_branch: "main"
    flux:
      interval: "15m"
      prune: true

  #############################################################################
  # STORAGE - DEPRECATED (Moved to infrastructure.storage)
  #############################################################################
  # NOTE: This section is deprecated in v2.0 and moved to infrastructure.storage
  # Kept for backward compatibility only. Use infrastructure.storage instead.
  # 
  # storage:
  #   default_storage_class: "csi-cinder-sc-delete"
  #   worker_volume_size: 100
  #   worker_volume_destination_type: "volume"
  #   worker_volume_source_type: "image"
  #   worker_volume_type: "HA-Standard"
  #   additional_block_devices: []

  #############################################################################
  # TALOS - Optional Talos Configuration (disabled)
  #############################################################################
  # talos: null  # Uncomment and configure for Talos deployment

  #############################################################################
  # MANAGED SERVICES - External/Vendor-Managed
  #############################################################################
  managed_services:
    alert-proxy:
      enabled: true
      image_repository: "ghcr.io/rackerlabs/alert-proxy"
      image_tag: "v1.2.0"
      gitops_source_repo: "ssh://git@github.com/rackerlabs/opencenter-gitops-base.git"
      gitops_source_release: "v0.1.0"
      gitops_source_branch: "main"
      alert_manager_base_url: "https://alertmanager.prod-cluster.sjc3.k8s.acme.com"
      http_route_fqdn: "https://alerts.prod-cluster.sjc3.k8s.acme.com"

  #############################################################################
  # SERVICES - Self-Hosted Platform Services
  #############################################################################
  services:
    # CNI
    calico:
      enabled: true
      calico_kube_api_server: "https://api.prod-cluster.sjc3.k8s.acme.com:6443"
    
    # Certificate Management
    cert-manager:
      enabled: true
      email: "platform-team@acme.com"
      region: "us-east-1"
      letsencrypt_server: "https://acme-v02.api.letsencrypt.org/directory"
    
    # Backup
    etcd-backup:
      enabled: true
      s3_host: "https://swift.api.sjc3.rackspacecloud.com"
      s3_region: "SJC3"
    
    # Core Infrastructure
    external-snapshotter:
      enabled: true
    fluxcd:
      enabled: true
    gateway:
      enabled: true
    gateway-api:
      enabled: true
    
    # Dashboard
    headlamp:
      enabled: true
      hostname: "dashboard.prod-cluster.sjc3.k8s.acme.com"
      oidc_issuer_url: "https://auth.prod-cluster.sjc3.k8s.acme.com/realms/opencenter"
      oidc_client_id: "kubernetes"
    
    # Identity
    keycloak:
      enabled: true
      hostname: "auth.prod-cluster.sjc3.k8s.acme.com"
      realm: "opencenter"
      client_id: "kubernetes"
      frontend_url: "https://auth.prod-cluster.sjc3.k8s.acme.com"
    
    # Monitoring
    kube-prometheus-stack:
      enabled: true
      prometheus_volume_size: 100
      prometheus_storage_class: "csi-cinder-sc-delete"
      grafana_volume_size: 20
      grafana_storage_class: "csi-cinder-sc-delete"
      alertmanager_volume_size: 10
      alertmanager_storage_class: "csi-cinder-sc-delete"
      webhook_url: "https://alerts.prod-cluster.sjc3.k8s.acme.com/webhook"
    
    # Policy
    kyverno:
      enabled: true
    
    # Logging
    loki:
      enabled: true
      namespace: "monitoring"
      loki_storage_type: "swift"
      loki_bucket_name: "prod-cluster-loki"
      loki_volume_size: 50
      loki_storage_class: "csi-cinder-sc-delete"
      swift_auth_url: "https://keystone.api.sjc3.rackspacecloud.com/v3/"
      swift_region: "SJC3"
      swift_auth_version: 3
      swift_application_credential_id: ""
      swift_container_name: "prod-cluster-loki"
      swift_user_domain_name: "rackspace_cloud_domain"
      swift_domain_name: "Default"
    
    # Operators
    olm:
      enabled: true
    openstack-ccm:
      enabled: true
    openstack-csi:
      enabled: true
    postgres-operator:
      enabled: true
    rbac-manager:
      enabled: true
    sources:
      enabled: true
    
    # Tracing
    tempo:
      enabled: true
      storage_type: "swift"
      bucket_name: "prod-cluster-tempo"
      volume_size: 20
      storage_class: "csi-cinder-sc-delete"
      swift_auth_url: "https://keystone.api.sjc3.rackspacecloud.com/v3/"
      swift_region: "SJC3"
    
    # Backup
    velero:
      enabled: true
      velero_backup_bucket: "prod-cluster-backups"
      velero_region: "SJC3"
    
    # vSphere CSI (disabled for OpenStack)
    vsphere-csi:
      enabled: false
    
    # GitOps UI
    weave-gitops:
      enabled: true
      hostname: "gitops.prod-cluster.sjc3.k8s.acme.com"

#############################################################################
# OPENTOFU - Infrastructure as Code Backend
#############################################################################
opentofu:
  enabled: true
  path: "opentofu"
  backend:
    type: "s3"
    local:
      path: ""
    s3:
      bucket: "acme-terraform-state"
      key: "prod-cluster/terraform.tfstate"
      region: "us-east-1"

#############################################################################
# DEPLOYMENT - Auto-deploy Settings
#############################################################################
deployment:
  auto_deploy: false

#############################################################################
# SECRETS - Credentials (SOPS Encrypted in Production)
#############################################################################
secrets:
  sops_age_key_file: "/home/admin/.config/opencenter/clusters/acme-corp/secrets/age/prod-cluster-key.txt"
  
  ssh_key:
    private: "/home/admin/.config/opencenter/clusters/acme-corp/secrets/ssh/prod-cluster"
    public: "/home/admin/.config/opencenter/clusters/acme-corp/secrets/ssh/prod-cluster.pub"
    cypher: "ed25519"
  
  global:
    aws:
      infrastructure:
        access_key: "AKIAIOSFODNN7EXAMPLE"
        secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
        region: "us-east-1"
      application:
        access_key: ""
        secret_access_key: ""
        region: ""
  
  cert_manager:
    aws_access_key: "AKIAIOSFODNN7EXAMPLE"
    aws_secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
  
  loki:
    swift_password: "swift-application-credential-secret"
  
  keycloak:
    client_secret: "keycloak-client-secret-uuid"
    admin_password: "secure-admin-password"
  
  headlamp:
    oidc_client_secret: "headlamp-oidc-secret"
  
  weave_gitops:
    password: "gitops-admin-password"
    password_hash: "$2a$10$..."
  
  grafana:
    admin_password: "grafana-admin-password"
  
  tempo:
    access_key: "tempo-swift-credential-id"
    secret_key: "tempo-swift-credential-secret"
  
  alert_proxy:
    core_device_id: "device-uuid"
    account_service_token: "service-token"
    core_account_number: "123456"
  
  vsphere_csi:
    vcenter_host: ""
    username: ""
    password: ""
    datacenters: ""
    insecure_flag: "false"
    port: "443"