locals:
  cluster_name: "dev-cluster"
  naming_prefix: "local.cluster_name"
  kubernetes_version: "1.30.4"
  talos_version: "v1.8.0"
  control_plane_count: 3
  worker_count: 2
  cluster_endpoint: ""
  cluster_id: ""
  cluster_secret: ""
  machine_type: "controlplane"
  install_disk: "/dev/sda"
  install_image: "ghcr.io/siderolabs/installer:latest"
  network_interface: "eth0"
  network_dhcp: true
  network_mtu: 1500
  cluster_discovery_enabled: true
  cluster_discovery_registries:
    ["registry.k8s.io", "k8s.gcr.io", "quay.io", "gcr.io"]
  pod_subnet: "10.244.0.0/16"
  service_subnet: "10.96.0.0/12"
  cluster_dns: "10.96.0.10"
  cluster_domain: "cluster.local"
  cni: "flannel"
  proxy_mode: "ipvs"
  skip_node_registration: false
  extra_manifests: []
  extra_mount_points: []
  sysctls: {}
  kernel_modules: []
  time_servers: ["time.cloudflare.com"]
  dns_domain: "local.cluster_name"
  registry_mirrors: {}
  registry_config: {}
  inline_manifests: []
  cluster_patches: []
  machine_patches: []
  talosconfig_path: "talosconfig"
  kubeconfig_path: "kubeconfig"
  apply_config_immediately: false
  config_debug: false
  persist_config: true
  machine_cert_san: []

modules:
  talos-cluster:
    source: "github.com/rackerlabs/opencenter-gitops-base.git//install/iac/infra/talos?ref=main"
    cluster_name: "local.cluster_name"
    kubernetes_version: "local.kubernetes_version"
    talos_version: "local.talos_version"
    control_plane_count: "local.control_plane_count"
    worker_count: "local.worker_count"
    cluster_endpoint: "local.cluster_endpoint"
    cluster_id: "local.cluster_id"
    cluster_secret: "local.cluster_secret"
    install_disk: "local.install_disk"
    install_image: "local.install_image"
    network_interface: "local.network_interface"
    network_dhcp: "local.network_dhcp"
    network_mtu: "local.network_mtu"
    cluster_discovery_enabled: "local.cluster_discovery_enabled"
    cluster_discovery_registries: "local.cluster_discovery_registries"
    pod_subnet: "local.pod_subnet"
    service_subnet: "local.service_subnet"
    cluster_dns: "local.cluster_dns"
    cluster_domain: "local.cluster_domain"
    cni: "local.cni"
    proxy_mode: "local.proxy_mode"
    extra_manifests: "local.extra_manifests"
    extra_mount_points: "local.extra_mount_points"
    sysctls: "local.sysctls"
    kernel_modules: "local.kernel_modules"
    time_servers: "local.time_servers"
    dns_domain: "local.dns_domain"
    registry_mirrors: "local.registry_mirrors"
    registry_config: "local.registry_config"
    talosconfig_path: "local.talosconfig_path"
    kubeconfig_path: "local.kubeconfig_path"
    apply_config_immediately: "local.apply_config_immediately"
    config_debug: "local.config_debug"
    persist_config: "local.persist_config"
    machine_cert_san: "local.machine_cert_san"
  talos-bootstrap:
    source: "github.com/rackerlabs/opencenter-gitops-base.git//install/iac/talos-bootstrap?ref=main"
    cluster_name: "local.cluster_name"
    cluster_endpoint: "local.cluster_endpoint"
    talosconfig_path: "local.talosconfig_path"
    kubeconfig_path: "local.kubeconfig_path"
    control_plane_nodes: "module.talos-cluster.control_plane_nodes"
    worker_nodes: "module.talos-cluster.worker_nodes"
    bootstrap_timeout: "10m"
    wait_for_cluster: true
