# HTTPRoute configuration for Keycloak authentication service
# Uses Gateway API v1 for modern ingress routing
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  # Reference to the parent Gateway that will handle traffic
  parentRefs:
    - name: rmpk-gateway              # Gateway name in rackspace-system namespace
      sectionName: keycloak-https     # Specific listener section for HTTPS traffic
      namespace: rackspace-system     # Gateway namespace (cross-namespace reference)
  # Hostname(s) this route will match
  hostnames:
    - "auth.prosys.dev.dfw3.k8s.opencenter.cloud"  # Public DNS name for Keycloak
  # Routing rules defining backend services
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Host
                value: auth.prosys.dev.dfw3.k8s.opencenter.cloud

    - backendRefs:
        - name: keycloak-service      # Target service name in same namespace
          port: 8080                  # Service port (standard Keycloak HTTP port)
