name: Container Image

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare build metadata
        id: build-metadata
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME:-dev}"
          git_tag=""
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${version#v}"
            git_tag="${version}"
          elif [[ -s VERSION ]]; then
            version="$(tr -d '[:space:]' < VERSION)"
          fi

          image="${REGISTRY}/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          git_branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-unknown}}"
          build_date="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "version=${version}"
            echo "git_tag=${git_tag}"
            echo "image=${image}"
            echo "git_branch=${git_branch}"
            echo "build_date=${build_date}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.build-metadata.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
          build-args: |
            VERSION=${{ steps.build-metadata.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ steps.build-metadata.outputs.git_branch }}
            GIT_TAG=${{ steps.build-metadata.outputs.git_tag }}
            BUILD_DATE=${{ steps.build-metadata.outputs.build_date }}
