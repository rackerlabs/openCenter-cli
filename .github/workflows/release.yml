name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  id-token: write

jobs:
  build-cli:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          mkdir -p dist
          GIT_COMMIT="$(git rev-parse HEAD)"
          GIT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          BUILD_DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          OUTPUT="dist/opencenter-${VERSION}-${GOOS}-${GOARCH}"

          go build -trimpath -ldflags "\
            -X main.version=${VERSION} \
            -X main.gitCommit=${GIT_COMMIT} \
            -X main.gitBranch=${GIT_BRANCH} \
            -X main.gitTag=${VERSION} \
            -X main.buildDate=${BUILD_DATE}" \
            -o "${OUTPUT}"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v5
        with:
          name: opencenter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/opencenter-*

  build-plugin:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build plugin
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          mkdir -p dist
          OUTPUT="dist/opencenter-local-${VERSION}-${GOOS}-${GOARCH}"

          go build -trimpath -o "${OUTPUT}" ./cmd/opencenter-local

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v5
        with:
          name: opencenter-local-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/opencenter-local-*

  release:
    runs-on: ubuntu-latest
    needs: [build-cli, build-plugin]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum opencenter-* | sort > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign release artifacts with cosign keyless
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          shopt -s nullglob
          for artifact in dist/opencenter-* dist/checksums.txt; do
            cosign sign-blob \
              --yes \
              --bundle "${artifact}.bundle" \
              "${artifact}"
          done

      - name: Install syft
        run: go install github.com/anchore/syft/cmd/syft@latest

      - name: Generate SBOM
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/syft" dir:dist -o spdx-json=dist/opencenter.spdx.json

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
