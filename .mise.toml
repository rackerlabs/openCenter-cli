  "./hack/gitea-local/setup-gitea.sh destroy -y",
  "rm -f .gitea_admin_token .gitea_newuser_token .gitea_newuser_id_ed25519 .gitea_newuser_id_ed25519.pub"
]

# Create a kind cluster with no CNI and experimental podman support
kind-cluster-no-cni = """
echo "Creating kind cluster with no CNI and podman support..."
cat <<EOF | KIND_EXPERIMENTAL_PROVIDER=podman kind create cluster --name opencenter-dev --config=-
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
nodes:
- role: control-plane
- role: worker
- role: worker
- role: worker
EOF
echo "Exporting kubeconfig for kind cluster..."
KIND_EXPERIMENTAL_PROVIDER=podman kind export kubeconfig --name opencenter-dev
echo "Cluster created successfully! Nodes will show NotReady until CNI is installed."
"""

clean = [
  "echo Cleaning up...",
  "rm -rf testdata",
  "rm -rf bin"
]

# Generate Terraform main.tf from cluster configuration
terraform-generate = '''
#!/usr/bin/env bash
set -e

if [ $# -eq 0 ]; then
  echo "Usage: mise run terraform-generate <cluster-name> [output-dir]"
  echo "Example: mise run terraform-generate my-cluster ./output"
  exit 1
fi

CLUSTER_NAME="$1"
OUTPUT_DIR="${2:-./terraform-output}"

echo "Generating Terraform configuration for cluster: ${CLUSTER_NAME}"
echo "Output directory: ${OUTPUT_DIR}"

# Build the binary first
mise run build

# Generate the Terraform files
./bin/openCenter cluster terraform-generate "${CLUSTER_NAME}" --output-dir="${OUTPUT_DIR}"

echo "Terraform files generated successfully in ${OUTPUT_DIR}"
echo "Files created:"
ls -la "${OUTPUT_DIR}/"
'''

# Export AWS credentials for current cluster
export-aws-creds = "./bin/openCenter cluster credentials export --provider aws --format env"

# Export OpenStack credentials for current cluster  
export-os-creds = "./bin/openCenter cluster credentials export --provider openstack --format env"

# Export all credentials for current cluster
export-all-creds = "./bin/openCenter cluster credentials export --provider all --format env"

# Export AWS credentials in Terraform format
export-aws-terraform = "./bin/openCenter cluster credentials export --provider aws --format terraform"

# Export OpenStack credentials as clouds.yaml
export-os-clouds = "./bin/openCenter cluster credentials export --provider openstack --format clouds-yaml"

# Clear AWS credentials from environment
unset-aws-creds = "./bin/openCenter cluster credentials unset --provider aws"

# Clear OpenStack credentials from environment
unset-os-creds = "./bin/openCenter cluster credentials unset --provider openstack"

# Clear all cloud credentials from environment
unset-all-creds = "./bin/openCenter cluster credentials unset --provider all"

# Setup development environment with credentials
dev-env-setup = '''
#!/usr/bin/env bash
set -e

echo "Setting up development environment..."

# Check if there's an active cluster
ACTIVE_CLUSTER=$(./bin/openCenter cluster current 2>/dev/null || echo "")

if [ -z "$ACTIVE_CLUSTER" ]; then
  echo "No active cluster found. Use 'openCenter cluster select <name>' to set one."
  exit 1
fi

echo "Using active cluster: $ACTIVE_CLUSTER"

# Export credentials
echo "Exporting credentials..."
eval $(./bin/openCenter cluster credentials export --provider all --format env)

echo "Development environment ready!"
echo "Available environment variables:"
env | grep -E "^(AWS_|OS_)" | sort
'''

# Clean development environment credentials
dev-env-clean = '''
#!/usr/bin/env bash
set -e

echo "Cleaning development environment credentials..."
eval $(./bin/openCenter cluster credentials unset --provider all)
echo "Credentials cleared from environment."
'''

# Comprehensive schema change verification task
# Use this task whenever making changes to:
# - internal/config/schema.go (schema definition)
# - internal/config/config.go (struct definitions)
# - testdata/schema.yaml (reference schema)
# - Any schema-related default generation logic
schema-verify = [
  "echo === Building project ===",
  "mise run build",
  "echo === Testing schema generation ===",
  "./bin/openCenter cluster schema --pretty > new-schema.json && echo 'Schema generated successfully' || echo 'FAILED: Schema generation'",
  "echo === Testing cluster init with new schema ===",
  "OPENCENTER_CONFIG_DIR=./testdata/config ./bin/openCenter cluster init test-verify --force && echo 'Cluster init successful' || echo 'FAILED: Cluster init'",
  "echo === Testing cluster update ===",
  "OPENCENTER_CONFIG_DIR=./testdata/config ./bin/openCenter cluster update test-verify --opencenter.provider=aws && echo 'Cluster update successful' || echo 'FAILED: Cluster update'",
  "echo === Testing validation ===",
  "unset OPENCENTER_DEBUG && OPENCENTER_CONFIG_DIR=./testdata/config ./bin/openCenter cluster validate test-verify && echo 'Validation successful' || echo 'FAILED: Validation'",
  "echo === Running unit tests ===",
  "mise run test && echo 'Unit tests passed' || echo 'WARNING: Unit tests failed - may need test updates for schema changes'",
  "echo === Running BDD tests ===",
  "mise run godog && echo 'BDD tests passed' || echo 'WARNING: BDD tests failed - may need test updates for schema changes'",
  "echo === Comparing with reference schema ===",
  "if [ -f testdata/schema.yaml ]; then echo 'Reference schema found - manual comparison recommended:'; echo 'Run: diff testdata/schema.yaml testdata/config/test-verify.yaml'; else echo 'No reference schema found at testdata/schema.yaml'; fi",
  "echo === Schema verification results ===",
  "echo 'Generated files:'",
  "echo '  - new-schema.json (JSON schema)'",
  "echo '  - testdata/config/test-verify.yaml (sample config)'",
  "echo ''",
  "echo 'Manual verification steps:'",
  "echo '1. Review new-schema.json for correct structure'",
  "echo '2. Compare generated config with testdata/schema.yaml'",
  "echo '3. Update tests if they failed due to schema changes'",
  "echo '4. Update documentation (docs/reference/config.md)'",
  "echo '5. Test with existing cluster configurations'",
  "echo '=== Schema verification complete ==='",
]
# Install git hooks for development
install-hooks = '''
#!/usr/bin/env bash
set -e

echo "Installing git hooks for openCenter development..."

# Create hooks directory if it doesn't exist
mkdir -p .git/hooks

# Install pre-commit hook for SOPS encryption validation
if [ ! -f .git/hooks/pre-commit ]; then
    echo "ERROR: Pre-commit hook not found in repository"
    echo "This should be committed to the repository for all developers"
    exit 1
fi

# Make sure the hook is executable
chmod +x .git/hooks/pre-commit

echo "✅ Git hooks installed successfully!"
echo ""
echo "Installed hooks:"
echo "  - pre-commit: Validates SOPS encryption of cluster config secrets"
echo ""
echo "The pre-commit hook will:"
echo "  - Check cluster configuration files for sensitive data"
echo "  - Ensure sensitive data is encrypted with SOPS"
echo "  - Block commits with unencrypted secrets"
echo ""
echo "To encrypt a file with SOPS:"
echo "  sops -e -i <file>"
echo "  # or"
echo "  openCenter sops secrets-encrypt <file>"
'''

# Test the pre-commit hook with sample files
test-hooks = '''
#!/usr/bin/env bash
set -e

echo "Testing pre-commit hook functionality..."

# Create a temporary test directory
TEST_DIR=$(mktemp -d)
cd "$TEST_DIR"

# Initialize a git repo
git init
git config user.email "test@example.com"
git config user.name "Test User"

# Copy the pre-commit hook
cp "$OLDPWD/.git/hooks/pre-commit" .git/hooks/
chmod +x .git/hooks/pre-commit

echo "Creating test files..."

# Test 1: File with no sensitive data (should pass)
cat > test-safe-config.yaml << EOF
opencenter:
  cluster:
    cluster_name: test-cluster
    provider: openstack
  infrastructure:
    cloud:
      openstack:
        auth_url: https://keystone.example.com/v3
        region: RegionOne
        application_credential_id: ""
        application_credential_secret: ""
EOF

# Test 2: File with sensitive data (should fail)
cat > test-unsafe-config.yaml << EOF
opencenter:
  cluster:
    cluster_name: test-cluster
    provider: openstack
  infrastructure:
    cloud:
      openstack:
        auth_url: https://keystone.example.com/v3
        region: RegionOne
        application_credential_id: "real-credential-id"
        application_credential_secret: "real-secret-value"
EOF

# Test 3: File with SOPS encrypted data (should pass)
cat > test-encrypted-config.yaml << EOF
opencenter:
  cluster:
    cluster_name: test-cluster
    provider: openstack
  infrastructure:
    cloud:
      openstack:
        auth_url: https://keystone.example.com/v3
        region: RegionOne
        application_credential_id: ENC[AES256_GCM,data:encrypted_data_here,iv:iv_here,tag:tag_here,type:str]
        application_credential_secret: ENC[AES256_GCM,data:encrypted_secret_here,iv:iv_here,tag:tag_here,type:str]
sops:
    age:
        - recipient: age1234567890abcdef
          enc: ENC[AES256_GCM,data:encrypted_key_here,type:str]
    lastmodified: "2024-01-01T00:00:00Z"
    mac: ENC[AES256_GCM,data:mac_here,type:str]
EOF

echo "Running tests..."

# Test safe file (should pass)
git add test-safe-config.yaml
if git commit -m "Test safe config"; then
    echo "✅ Test 1 PASSED: Safe config file accepted"
else
    echo "❌ Test 1 FAILED: Safe config file rejected"
    exit 1
fi

# Test unsafe file (should fail)
git add test-unsafe-config.yaml
if git commit -m "Test unsafe config" 2>/dev/null; then
    echo "❌ Test 2 FAILED: Unsafe config file was accepted (should have been rejected)"
    exit 1
else
    echo "✅ Test 2 PASSED: Unsafe config file correctly rejected"
fi

# Test encrypted file (should pass)
git add test-encrypted-config.yaml
if git commit -m "Test encrypted config"; then
    echo "✅ Test 3 PASSED: Encrypted config file accepted"
else
    echo "❌ Test 3 FAILED: Encrypted config file rejected"
    exit 1
fi

# Cleanup
cd "$OLDPWD"
rm -rf "$TEST_DIR"

echo ""
echo "🎉 All pre-commit hook tests passed!"
echo "The hook is working correctly and will protect against committing unencrypted secrets."
'''