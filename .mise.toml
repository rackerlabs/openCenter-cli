# Detect failing scenarios and tag them with @wip
tag-wip-failures = "python3 hack/tag_wip_failures.py"

# Run all BDD tests (alias for godog)
test-bdd = "go test ./... -v args --godog.tags=~@wip --godog.paths=tests/features"

# Run regression tests (non-WIP scenarios)
test-regression = "go test ./... -v args --godog.tags=~@wip --godog.paths=tests/features"

