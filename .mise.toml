[tools]
golang = "1.26.3"
kubectl = "latest"
kind = "latest"
helm = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"

[env]
# Override the default config directory via environment for reproducible tests
#OPENCENTER_CONFIG_DIR = "./testdata/config"

# When true debug logs are set to true and other artifacts are created to help troubleshoot or verify functionality
#OPENCENTER_DEBUG = true

# Enable podman support for KIND utility
KIND_EXPERIMENTAL_PROVIDER = "podman" 

CONTAINER_RUNTIME = "podman" 

#OPENCENTER_PLUGINS_DIR = "./testdata/plugins/"

[tasks]
# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------

# Build the opencenter CLI binary with version information
build-cli = '''
#!/usr/bin/env bash
set -e

GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
VERSION=${GIT_TAG:-"0.0.1"}

go build -ldflags "\
  -X main.version=${VERSION} \
  -X main.gitCommit=${GIT_COMMIT} \
  -X main.gitBranch=${GIT_BRANCH} \
  -X main.gitTag=${GIT_TAG} \
  -X main.buildDate=${BUILD_DATE}" \
  -o bin/opencenter

echo "Built opencenter ${VERSION} (${GIT_COMMIT:0:7})"
'''

# Build the local workflow plugin
build-local-plugin = '''
#!/usr/bin/env bash
set -e

go build -o bin/opencenter-local ./cmd/opencenter-local
echo "Built opencenter-local"
'''

# Build both the opencenter CLI and the local workflow plugin
build = [
  "mise run build-cli",
  "mise run build-local-plugin"
]

# Build the opencenter binary for Linux
build-linux = '''
#!/usr/bin/env bash
set -e

GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
VERSION=${GIT_TAG:-"0.0.1"}

GOOS=linux GOARCH=amd64 go build -ldflags "\
  -X main.version=${VERSION} \
  -X main.gitCommit=${GIT_COMMIT} \
  -X main.gitBranch=${GIT_BRANCH} \
  -X main.gitTag=${GIT_TAG} \
  -X main.buildDate=${BUILD_DATE}" \
  -o bin/opencenter-linux

echo "Built opencenter-linux ${VERSION} (${GIT_COMMIT:0:7})"
'''

# Build binaries for multiple platforms
build-all = '''
#!/usr/bin/env bash
set -e

echo "Building for multiple platforms..."

GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
VERSION=${GIT_TAG:-"0.0.1"}

LDFLAGS="-X main.version=${VERSION} \
  -X main.gitCommit=${GIT_COMMIT} \
  -X main.gitBranch=${GIT_BRANCH} \
  -X main.gitTag=${GIT_TAG} \
  -X main.buildDate=${BUILD_DATE}"

GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/opencenter-linux-amd64
GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/opencenter-linux-arm64
GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/opencenter-darwin-amd64
GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/opencenter-darwin-arm64

echo "Build complete:"
ls -la bin/opencenter-*
echo ""
echo "Version: ${VERSION} | Commit: ${GIT_COMMIT:0:7} | Branch: ${GIT_BRANCH}"
'''

# Build and install to local bin directory
local-install = '''
#!/usr/bin/env bash
set -e

mise run build-cli
mise run build-local-plugin

mkdir -p ~/.local/bin
mkdir -p "${OPENCENTER_CONFIG_DIR:-$HOME/.config/opencenter}/plugins"

PLUGINS_DIR="${OPENCENTER_CONFIG_DIR:-$HOME/.config/opencenter}/plugins"
PLUGIN_PATH="${PLUGINS_DIR}/opencenter-local"
CHECKSUMS_FILE="${PLUGINS_DIR}/checksums.txt"

cp bin/opencenter ~/.local/bin/opencenter
cp bin/opencenter-local "${PLUGIN_PATH}"

chmod +x ~/.local/bin/opencenter
chmod +x "${PLUGIN_PATH}"

# Register the plugin checksum so discovery treats it as verified
PLUGIN_SHA=$(shasum -a 256 "${PLUGIN_PATH}" | awk '{print $1}')
TMP_CHECKSUMS=$(mktemp)
if [ -f "${CHECKSUMS_FILE}" ]; then
  grep -v ' opencenter-local' "${CHECKSUMS_FILE}" > "${TMP_CHECKSUMS}" || true
fi
printf '%s  opencenter-local\n' "${PLUGIN_SHA}" >> "${TMP_CHECKSUMS}"
mv "${TMP_CHECKSUMS}" "${CHECKSUMS_FILE}"

echo "Installed opencenter to ~/.local/bin/opencenter"
echo "Installed opencenter-local to ${PLUGIN_PATH}"
echo "Updated plugin checksum in ${CHECKSUMS_FILE}"
'''

# ---------------------------------------------------------------------------
# Release
# ---------------------------------------------------------------------------

# Build release binaries for all platforms with specified version and generate release notes
# Usage: mise run release <version> [publish-target]
# Example: mise run release v0.0.1-rc3
# Example: mise run release v0.0.1-rc3 opencenter-cloud/community-artifacts
release = '''
#!/usr/bin/env bash
set -e

if [ -z "$1" ]; then
  echo "ERROR: Version argument required"
  echo "Usage: mise run release <version> [publish-target]"
  echo "Example: mise run release v0.0.1-rc3"
  exit 1
fi

VERSION="$1"
PUBLISH_TARGET="${2:-opencenter-cloud/opencenter-cli}"
VERSION="${VERSION#v}"

echo "Building release binaries for version ${VERSION}..."
echo "Publish target: ${PUBLISH_TARGET}"
echo ""

GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

LDFLAGS="-X main.version=${VERSION} \
  -X main.gitCommit=${GIT_COMMIT} \
  -X main.gitBranch=${GIT_BRANCH} \
  -X main.gitTag=${VERSION} \
  -X main.buildDate=${BUILD_DATE}"

mkdir -p bin/release

echo "Building Linux AMD64..."
GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/release/opencenter-${VERSION}-linux-amd64

echo "Building Linux ARM64..."
GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/release/opencenter-${VERSION}-linux-arm64

echo "Building macOS AMD64..."
GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/release/opencenter-${VERSION}-darwin-amd64

echo "Building macOS ARM64..."
GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/release/opencenter-${VERSION}-darwin-arm64

echo ""
echo "=== Release Build Complete ==="
echo "Version: ${VERSION} | Commit: ${GIT_COMMIT:0:7} | Branch: ${GIT_BRANCH}"
echo ""
ls -lh bin/release/
echo ""

# Generate release notes
mise run publish "${VERSION}" "${PUBLISH_TARGET}"

echo ""
echo "Next steps:"
echo "  1. Review bin/release/RELEASE_NOTES_${VERSION}.md"
echo "  2. Test binaries on target platforms"
echo "  3. Tag and push:"
echo "     git tag -a v${VERSION} -m 'Release ${VERSION}'"
echo "     git push origin v${VERSION}"
echo "  4. Create GitHub release:"
echo "     gh release create v${VERSION} \\"
echo "       --repo ${PUBLISH_TARGET} \\"
echo "       --title 'opencenter ${VERSION}' \\"
echo "       --notes-file bin/release/RELEASE_NOTES_${VERSION}.md \\"
echo "       --prerelease \\"
echo "       bin/release/opencenter-*"
'''

# Publish release to GitHub with auto-generated release notes
# Usage: mise run publish <version> [publish-target]
publish = '''
#!/usr/bin/env bash
set -e

if [ -z "$1" ]; then
  echo "ERROR: Version argument required"
  echo "Usage: mise run publish <version> [publish-target]"
  exit 1
fi

VERSION="$1"
PUBLISH_TARGET="${2:-opencenter-cloud/opencenter-cli}"
VERSION="${VERSION#v}"
TAG="v${VERSION}"
RELEASE_DIR="bin/release"

echo "=== Generating Release Notes for ${VERSION} ==="

LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
if [ -z "$LAST_TAG" ]; then
  COMMIT_RANGE="HEAD"
else
  COMMIT_RANGE="${LAST_TAG}..HEAD"
fi

RELEASE_NOTES_FILE="${RELEASE_DIR}/RELEASE_NOTES_${VERSION}.md"
mkdir -p "${RELEASE_DIR}"

cat > "$RELEASE_NOTES_FILE" << EOF
# opencenter ${VERSION}

Release ${VERSION} of opencenter CLI.

## Changes in This Release

EOF

FEATURES=$(git log $COMMIT_RANGE --oneline --no-merges | grep -E "^[a-f0-9]+ feat" | sed 's/^[a-f0-9]* feat//' || echo "")
if [ -n "$FEATURES" ]; then
  echo "**New Features**" >> "$RELEASE_NOTES_FILE"
  echo "" >> "$RELEASE_NOTES_FILE"
  echo "$FEATURES" | while IFS= read -r line; do
    [ -n "$line" ] && echo "- $line" >> "$RELEASE_NOTES_FILE"
  done
  echo "" >> "$RELEASE_NOTES_FILE"
fi

FIXES=$(git log $COMMIT_RANGE --oneline --no-merges | grep -E "^[a-f0-9]+ fix" | sed 's/^[a-f0-9]* fix//' || echo "")
if [ -n "$FIXES" ]; then
  echo "**Bug Fixes**" >> "$RELEASE_NOTES_FILE"
  echo "" >> "$RELEASE_NOTES_FILE"
  echo "$FIXES" | while IFS= read -r line; do
    [ -n "$line" ] && echo "- $line" >> "$RELEASE_NOTES_FILE"
  done
  echo "" >> "$RELEASE_NOTES_FILE"
fi

DOCS=$(git log $COMMIT_RANGE --oneline --no-merges | grep -E "^[a-f0-9]+ docs" | sed 's/^[a-f0-9]* docs//' || echo "")
if [ -n "$DOCS" ]; then
  echo "**Documentation**" >> "$RELEASE_NOTES_FILE"
  echo "" >> "$RELEASE_NOTES_FILE"
  echo "$DOCS" | while IFS= read -r line; do
    [ -n "$line" ] && echo "- $line" >> "$RELEASE_NOTES_FILE"
  done
  echo "" >> "$RELEASE_NOTES_FILE"
fi

cat >> "$RELEASE_NOTES_FILE" << EOF
## Installation

Download the binary for your platform and move it to your PATH.

**Linux (x86_64)**
\`\`\`bash
curl -L https://github.com/${PUBLISH_TARGET}/releases/download/${TAG}/opencenter-${VERSION}-linux-amd64 -o opencenter
chmod +x opencenter
sudo mv opencenter /usr/local/bin/
\`\`\`

**Linux (ARM64)**
\`\`\`bash
curl -L https://github.com/${PUBLISH_TARGET}/releases/download/${TAG}/opencenter-${VERSION}-linux-arm64 -o opencenter
chmod +x opencenter
sudo mv opencenter /usr/local/bin/
\`\`\`

**macOS (Intel)**
\`\`\`bash
curl -L https://github.com/${PUBLISH_TARGET}/releases/download/${TAG}/opencenter-${VERSION}-darwin-amd64 -o opencenter
chmod +x opencenter
sudo mv opencenter /usr/local/bin/
\`\`\`

**macOS (Apple Silicon)**
\`\`\`bash
curl -L https://github.com/${PUBLISH_TARGET}/releases/download/${TAG}/opencenter-${VERSION}-darwin-arm64 -o opencenter
chmod +x opencenter
sudo mv opencenter /usr/local/bin/
\`\`\`

Check the installation:
\`\`\`bash
opencenter version
\`\`\`

## Platform Support

- Linux x86_64
- Linux ARM64
- macOS Intel
- macOS Apple Silicon

Windows is not supported due to platform-specific file locking code.

## Known Issues

See the [issue tracker](https://github.com/${PUBLISH_TARGET}/issues) for current known issues.

## Full Changelog

Compare changes: https://github.com/${PUBLISH_TARGET}/compare/${LAST_TAG}...${TAG}
EOF

echo "Release notes generated: $RELEASE_NOTES_FILE"
'''

# ---------------------------------------------------------------------------
# Code quality
# ---------------------------------------------------------------------------

# Format all Go source files
fmt = "gofmt -w ."

# Tidy Go module dependencies
tidy = "go mod tidy"

# Upgrade all Go dependencies to their latest versions
upgrade-deps = '''
#!/usr/bin/env bash
set -e

echo "Upgrading all Go dependencies..."
go get -u ./...
go mod tidy
echo "Done. Run 'mise run test' to verify."
'''

# Lint Go source files
lint = [
  "echo Linting...",
  "bin/golangci-lint run ./..."
]

# ---------------------------------------------------------------------------
# Test
# ---------------------------------------------------------------------------

# Run unit tests (config, cmd, cloud packages)
test = '''
#!/usr/bin/env bash
set -e

go test ./internal/config/... ./cmd/... -count=1
go test ./internal/cloud/... -count=1
'''

# Run the Go race detector across the CI package set
test-race = "go test ./internal/... ./cmd/... -count=1 -race"

# Run BDD tests via godog (non-@wip scenarios)
godog = "go test ./tests/features/steps/... -v -- --godog.tags=~@wip --godog.paths=tests/features"

# Run only @wip BDD scenarios for focused development
godog-wip = "go test ./tests/features/steps/... -v -- --godog.tags=@wip --godog.paths=tests/features"

# Run BDD scenarios filtered by tag
# Usage: mise run godog-tag <tag>
# Example: mise run godog-tag priority3
godog-tag = '''
#!/usr/bin/env bash
set -e

if [ -z "$1" ]; then
  echo "Usage: mise run godog-tag <tag>"
  echo "Example: mise run godog-tag priority3"
  exit 1
fi

go test ./tests/features/steps/... -v -- --godog.tags=@$1 --godog.paths=tests/features
'''

# Run all property-based tests
property = '''
#!/usr/bin/env bash
set -e

echo "=== Running Property-Based Tests ==="
go test ./internal/... -v -run "TestProperty"
echo "=== Property-Based Tests Complete ==="
'''

# Alias with the name used in the developer documentation.
test-properties = "mise run property"

# Run Go vulnerability analysis.
govulncheck = "govulncheck ./..."

# Run integration tests (resilience, operations, cluster setup)
integration = '''
#!/usr/bin/env bash
set -e

echo "=== Running Integration Tests ==="

echo "1. Cluster Setup Integration..."
go test -v ./cmd -run "TestClusterSetup"

echo "2. Resilience (retry, circuit breaker, lock manager)..."
go test -v ./internal/resilience/... -run "TestRetry|TestCircuitBreaker|TestLockManager|TestProperty"

echo "3. Operations (drift detector, backup manager)..."
go test -v ./internal/operations/... -run "TestDriftDetector|TestBackupManager|TestProperty"

echo "=== Integration Tests Complete ==="
'''

# Run performance-tagged checks
perf = '''
#!/usr/bin/env bash
set -e

go test -tags perf ./internal/config -run "TestMemoryUsageRegression" -count=1
'''

# Run all tests: unit + BDD + property
test-all = [
  "mise run test",
  "mise run godog",
  "mise run test-properties"
]

# Run local verification checks that catch CI regressions.
verify = [
  "mise run test",
  "mise run test-race",
  "mise run test-properties",
  "mise run govulncheck"
]

# ---------------------------------------------------------------------------
# Schema & validation
# ---------------------------------------------------------------------------

# Generate the cluster JSON schema into the schema directory
schema = "./bin/opencenter cluster schema --pretty --out schema/cluster.schema.json"

# Generate JSON schema from Go struct definitions
schema-gen = '''
#!/usr/bin/env bash
set -e
echo "Generating JSON schema from Go structs..."
go run ./cmd/schema-gen/main.go --version 2.0 --output schema/cluster.schema.json
echo "Schema generated at schema/cluster.schema.json"
'''

# Regenerate the v2 JSON schema from Go types (BaseConfig, services, etc.)
schema-v2 = '''
#!/usr/bin/env bash
set -e
cat > /tmp/regen_schema_test.go << 'GOEOF'
package v2schema

import (
	"os"
	"path/filepath"
	"testing"
)

func TestRegenSchema(t *testing.T) {
	root := repoRoot(t)
	data, err := Generate(Options{})
	if err != nil {
		t.Fatal(err)
	}
	path := filepath.Join(root, "schema", "opencenter-v2.schema.json")
	if err := os.WriteFile(path, data, 0o644); err != nil {
		t.Fatal(err)
	}
	t.Logf("regenerated %s (%d bytes)", path, len(data))
}
GOEOF
cp /tmp/regen_schema_test.go internal/config/v2schema/regen_test.go
go test ./internal/config/v2schema/ -run TestRegenSchema -count=1
rm internal/config/v2schema/regen_test.go
echo "v2 schema regenerated at schema/opencenter-v2.schema.json"
'''

# Validate cluster configuration
validate = "./bin/opencenter cluster validate"

# Comprehensive schema change verification
schema-verify = [
  "echo === Building project ===",
  "mise run build",
  "echo === Testing schema generation ===",
  "./bin/opencenter cluster schema --pretty > new-schema.json && echo 'Schema generated successfully' || echo 'FAILED: Schema generation'",
  "echo === Testing cluster init with new schema ===",
  "OPENCENTER_CONFIG_DIR=./testdata/config ./bin/opencenter cluster init test-verify --force && echo 'Cluster init successful' || echo 'FAILED: Cluster init'",
  "echo === Testing cluster update ===",
  "OPENCENTER_CONFIG_DIR=./testdata/config ./bin/opencenter cluster update test-verify --opencenter.provider=aws && echo 'Cluster update successful' || echo 'FAILED: Cluster update'",
  "echo === Testing validation ===",
  "unset OPENCENTER_DEBUG && OPENCENTER_CONFIG_DIR=./testdata/config ./bin/opencenter cluster validate test-verify && echo 'Validation successful' || echo 'FAILED: Validation'",
  "echo === Running unit tests ===",
  "mise run test && echo 'Unit tests passed' || echo 'WARNING: Unit tests failed'",
  "echo === Running BDD tests ===",
  "mise run godog && echo 'BDD tests passed' || echo 'WARNING: BDD tests failed'",
  "echo === Schema verification complete ==="
]

# ---------------------------------------------------------------------------
# Documentation
# ---------------------------------------------------------------------------

# Generate CLI documentation
docs-gen = "go run cmd/docs/generate.go"

# Detect failing BDD scenarios and tag them with @wip
tag-wip-failures = "python3 hack/tag_wip_failures.py"

# ---------------------------------------------------------------------------
# Local development environment
# ---------------------------------------------------------------------------

# Start and configure local Gitea for testing
gitea-up = [
  "echo Starting and provisioning gitea via the local plugin...",
  "go run ./cmd/opencenter-local gitea up"
]

# Tear down local Gitea instance
gitea-cleanup = [
  "echo Cleaning up local gitea...",
  "go run ./cmd/opencenter-local gitea destroy"
]

# Show the current active cluster status
active = "./bin/opencenter cluster status"

# Generate Terraform main.tf from cluster configuration
# Usage: mise run terraform-generate <cluster-name> [output-dir]
terraform-generate = '''
#!/usr/bin/env bash
set -e

if [ $# -eq 0 ]; then
  echo "Usage: mise run terraform-generate <cluster-name> [output-dir]"
  exit 1
fi

CLUSTER_NAME="$1"
OUTPUT_DIR="${2:-./terraform-output}"

echo "Generating Terraform configuration for cluster: ${CLUSTER_NAME}"
mise run build
./bin/opencenter cluster terraform-generate "${CLUSTER_NAME}" --output-dir="${OUTPUT_DIR}"
echo "Terraform files generated in ${OUTPUT_DIR}"
ls -la "${OUTPUT_DIR}/"
'''

# Preflight checks for cluster deployment
preflight = "./bin/opencenter cluster preflight"

# Install shell integration (prompt, completions)
install-shell-integration = "./hack/install-shell-integration.sh"

# Install git hooks for development
install-hooks = '''
#!/usr/bin/env bash
set -e

echo "Installing git hooks for opencenter development..."
mkdir -p .git/hooks

if [ ! -f .git/hooks/pre-commit ]; then
    echo "ERROR: Pre-commit hook not found in repository"
    exit 1
fi

chmod +x .git/hooks/pre-commit
echo "Git hooks installed. Pre-commit hook validates SOPS encryption of cluster config secrets."
'''

# ---------------------------------------------------------------------------
# Cleanup
# ---------------------------------------------------------------------------

# Remove build artifacts and generated files
clean = [
  "echo Cleaning up...",
  "rm -rf bin/",
  "rm -rf testdata/",
  "rm -f new-schema.json",
  "rm -rf terraform-output/"
]

# Destroy local Kind cluster and Gitea instance
# Usage: mise run kind-cleanup [cluster-name]
kind-cleanup = '''
#!/usr/bin/env bash
set -e

CLUSTER="${1:-my-cluster}"

echo "=== Cleaning up local Kind environment ==="

echo "1. Destroying cluster '${CLUSTER}'..."
if ./bin/opencenter cluster info "${CLUSTER}" >/dev/null 2>&1; then
  ./bin/opencenter cluster destroy "${CLUSTER}" --force
  echo "   Cluster destroyed"
else
  echo "   (cluster not found, skipping)"
fi

echo "2. Destroying local Gitea instance..."
if ./bin/opencenter local gitea status >/dev/null 2>&1; then
  ./bin/opencenter local gitea destroy
  echo "   Gitea destroyed"
else
  echo "   (gitea not running, skipping)"
fi

echo "3. Verifying cleanup..."
KIND_CLUSTERS=$(kind get clusters 2>&1 || true)
if echo "${KIND_CLUSTERS}" | grep -q "${CLUSTER}"; then
  echo "   WARNING: Kind cluster '${CLUSTER}' still exists. Run: kind delete cluster --name ${CLUSTER}"
else
  echo "   No Kind cluster '${CLUSTER}'"
fi

LOCK_FILE="${HOME}/.config/opencenter/locks/${CLUSTER}.lock"
if [ -f "${LOCK_FILE}" ]; then
  rm -f "${LOCK_FILE}"
  echo "   Removed stale lock file"
fi

echo "=== Cleanup complete ==="
'''

# Full demo teardown: destroy local Kind cluster + Gitea, then clean build artifacts
demo-cleanup = [
  "mise run kind-cleanup",
  "mise run clean"
]

# ---------------------------------------------------------------------------
# OpenStack utilities
# ---------------------------------------------------------------------------

# Reset an OpenStack project to a clean state (keeps default SG and PUBLICNET)
# Usage: mise run openstack-reset -- --os-cloud <name> [--force] [--dry-run]
openstack-reset = "hack/scripts/openstack-reset.sh"
