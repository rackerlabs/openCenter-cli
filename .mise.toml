# Priority 3: Cluster List and Select Commands (4 failing tests)
test-priority3 = "go test ./... -v args --godog.tags=@priority3 --godog.paths=tests/features"

# Priority 4: Validation Logic (6 failing tests)
test-priority4 = "go test ./... -v args --godog.tags=@priority4 --godog.paths=tests/features"

# Priority 5: Bootstrap Cleanup (1 failing test)
test-priority5 = "go test ./... -v args --godog.tags=@priority5 --godog.paths=tests/features"

# Priority 6: Info Command Output (2 failing tests)
