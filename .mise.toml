[tools]
golang = "latest"
kubectl = "latest"
kind = "latest"
helm = "latest"

[env]
# Override the default config directory via environment for reproducible tests
#OPENCENTER_CONFIG_DIR = "./testdata/config"

# When true deubg logs are set to true and other artifacts are created to help trouble shoot or verify functionality
#OPENCENTER_DEBUG = true

# Enable podman support for KIND utility
KIND_EXPERIMENTAL_PROVIDER = "podman" 

CONTAINER_RUNTIME = "podman" 

#OPENCENTER_PLUGINS_DIR = "./testdata/plugins/"

[tasks]
# Build the openCenter binary with version information
build = '''
#!/usr/bin/env bash
set -e

# Get git information
GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
VERSION=${GIT_TAG:-"0.0.1"}

# Build with ldflags
go build -ldflags "\
  -X main.version=${VERSION} \
  -X main.gitCommit=${GIT_COMMIT} \
  -X main.gitBranch=${GIT_BRANCH} \
  -X main.gitTag=${GIT_TAG} \
  -X main.buildDate=${BUILD_DATE}" \
  -o bin/openCenter

echo "Built openCenter ${VERSION} (${GIT_COMMIT:0:7})"
'''

# Build the openCenter binary for Linux
build-linux = '''
#!/usr/bin/env bash
set -e

# Get git information
GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
VERSION=${GIT_TAG:-"0.0.1"}

# Build with ldflags
GOOS=linux GOARCH=amd64 go build -ldflags "\
  -X main.version=${VERSION} \
  -X main.gitCommit=${GIT_COMMIT} \
  -X main.gitBranch=${GIT_BRANCH} \
  -X main.gitTag=${GIT_TAG} \
  -X main.buildDate=${BUILD_DATE}" \
  -o bin/openCenter-linux

echo "Built openCenter-linux ${VERSION} (${GIT_COMMIT:0:7})"
'''

# Build binaries for multiple platforms
build-all = '''
#!/usr/bin/env bash
set -e

echo "Building for multiple platforms..."

# Get git information
GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
VERSION=${GIT_TAG:-"0.0.1"}

LDFLAGS="-X main.version=${VERSION} \
  -X main.gitCommit=${GIT_COMMIT} \
  -X main.gitBranch=${GIT_BRANCH} \
  -X main.gitTag=${GIT_TAG} \
  -X main.buildDate=${BUILD_DATE}"

# Build for each platform
GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/openCenter-linux-amd64
GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/openCenter-linux-arm64
GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/openCenter-darwin-amd64
GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/openCenter-darwin-arm64
GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/openCenter-windows-amd64.exe

echo "Build complete. Binaries created:"
ls -la bin/openCenter-*
echo ""
echo "Version: ${VERSION}"
echo "Commit: ${GIT_COMMIT:0:7}"
echo "Branch: ${GIT_BRANCH}"
if [ -n "${GIT_TAG}" ]; then
  echo "Tag: ${GIT_TAG}"
fi
'''

# Build the openCenter binary
tidy = "go mod tidy"

# Upgrade all Go dependencies to their latest versions
upgrade-deps = '''
#!/usr/bin/env bash
set -e

echo "Upgrading all Go dependencies to latest versions..."

# Get all dependencies and upgrade them
go get -u ./...

# Tidy up the go.mod and go.sum files
go mod tidy

echo "Dependencies upgraded successfully!"
echo ""
echo "Run 'mise run test' to verify everything still works."
'''

# Format all files to golang standards
fmt = "gofmt -w ."

# Run BDD tests via go test
test = "go test ./internal/..."

# Run BDD tests via godog CLI (optional)
godog = "go test ./... -v args --godog.tags=~@wip --godog.paths=tests/features"

# Run only @wip scenarios for focused development
godog-wip = "go test ./... -v args --godog.tags=@wip --godog.paths=tests/features"

# Detect failing scenarios and tag them with @wip
tag-wip-failures = "python3 hack/tag_wip_failures.py"

# Generate the cluster JSON schema into the schema directory
schema = "./bin/openCenter cluster schema  --pretty --out schema/cluster.schema.json"

# Convenience tasks for validation
validate = "./bin/openCenter cluster validate"

# Preflight task for preflight
preflight = "./bin/openCenter cluster preflight"

# Generate and view documentation
doc = "go doc ./..."
doc-serve = "go run golang.org/x/pkgsite/cmd/pkgsite@latest"

# Generate CLI documentation
docs-gen = "go run generate.go"

lint = [
  "echo Linting...",
  "bin/golangci-lint run ./..."
]

gitea-setup = [
  "echo Starting gitea...",
  "./hack/gitea-local/setup-gitea.sh"
]

gitea-configure = [
  "echo Starting gitea...",
  "./hack/gitea-local/configure-gitea-user-tokens.sh"
]

# Start and configure local Gitea for testing (setup → configure)
gitea-up = [
  "mise run gitea-setup",
  "mise run gitea-configure"
]

gitea-cleanup = [
  "echo Cleaning up local git...",
  "./hack/gitea-local/setup-gitea.sh destroy -y",
  "rm -f .gitea_admin_token .gitea_newuser_token .gitea_newuser_id_ed25519 .gitea_newuser_id_ed25519.pub"
]

# Create a kind cluster with no CNI and experimental podman support
kind-cluster-no-cni = """
echo "Creating kind cluster with no CNI and podman support..."
cat <<EOF | KIND_EXPERIMENTAL_PROVIDER=podman kind create cluster --name opencenter-dev --config=-
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
nodes:
- role: control-plane
- role: worker
- role: worker
- role: worker
EOF
echo "Exporting kubeconfig for kind cluster..."
KIND_EXPERIMENTAL_PROVIDER=podman kind export kubeconfig --name opencenter-dev
echo "Cluster created successfully! Nodes will show NotReady until CNI is installed."
"""

clean = [
  "echo Cleaning up...",
  "rm -rf testdata",
  "rm -rf bin"
]

# Comprehensive schema change verification task
# Use this task whenever making changes to:
# - internal/config/schema.go (schema definition)
# - internal/config/config.go (struct definitions)
# - testdata/schema.yaml (reference schema)
# - Any schema-related default generation logic
schema-verify = [
  "echo === Building project ===",
  "mise run build",
  "echo === Testing schema generation ===",
  "./bin/openCenter cluster schema --pretty > new-schema.json && echo 'Schema generated successfully' || echo 'FAILED: Schema generation'",
  "echo === Testing cluster init with new schema ===",
  "OPENCENTER_CONFIG_DIR=./testdata/config ./bin/openCenter cluster init test-verify --force && echo 'Cluster init successful' || echo 'FAILED: Cluster init'",
  "echo === Testing cluster update ===",
  "OPENCENTER_CONFIG_DIR=./testdata/config ./bin/openCenter cluster update test-verify --opencenter.provider=aws && echo 'Cluster update successful' || echo 'FAILED: Cluster update'",
  "echo === Testing validation ===",
  "unset OPENCENTER_DEBUG && OPENCENTER_CONFIG_DIR=./testdata/config ./bin/openCenter cluster validate test-verify && echo 'Validation successful' || echo 'FAILED: Validation'",
  "echo === Running unit tests ===",
  "mise run test && echo 'Unit tests passed' || echo 'WARNING: Unit tests failed - may need test updates for schema changes'",
  "echo === Running BDD tests ===",
  "mise run godog && echo 'BDD tests passed' || echo 'WARNING: BDD tests failed - may need test updates for schema changes'",
  "echo === Comparing with reference schema ===",
  "if [ -f testdata/schema.yaml ]; then echo 'Reference schema found - manual comparison recommended:'; echo 'Run: diff testdata/schema.yaml testdata/config/test-verify.yaml'; else echo 'No reference schema found at testdata/schema.yaml'; fi",
  "echo === Schema verification results ===",
  "echo 'Generated files:'",
  "echo '  - new-schema.json (JSON schema)'",
  "echo '  - testdata/config/test-verify.yaml (sample config)'",
  "echo ''",
  "echo 'Manual verification steps:'",
  "echo '1. Review new-schema.json for correct structure'",
  "echo '2. Compare generated config with testdata/schema.yaml'",
  "echo '3. Update tests if they failed due to schema changes'",
  "echo '4. Update documentation (docs/reference/config.md)'",
  "echo '5. Test with existing cluster configurations'",
  "echo '=== Schema verification complete ==='",
]
