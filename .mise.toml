'''

# Build the openCenter binary for Linux
build-linux = '''
#!/usr/bin/env bash
set -e

# Get git information
GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
VERSION=${GIT_TAG:-"0.0.1"}

# Build with ldflags
GOOS=linux GOARCH=amd64 go build -ldflags "\
  -X main.version=${VERSION} \
  -X main.gitCommit=${GIT_COMMIT} \
  -X main.gitBranch=${GIT_BRANCH} \
  -X main.gitTag=${GIT_TAG} \
  -X main.buildDate=${BUILD_DATE}" \
  -o bin/openCenter-linux

echo "Built openCenter-linux ${VERSION} (${GIT_COMMIT:0:7})"
'''

# Build binaries for multiple platforms
build-all = '''
#!/usr/bin/env bash
set -e

echo "Building for multiple platforms..."

# Get git information
GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
VERSION=${GIT_TAG:-"0.0.1"}

LDFLAGS="-X main.version=${VERSION} \
  -X main.gitCommit=${GIT_COMMIT} \
  -X main.gitBranch=${GIT_BRANCH} \
  -X main.gitTag=${GIT_TAG} \
  -X main.buildDate=${BUILD_DATE}"

# Build for each supported platform (Unix-like systems only)
GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/openCenter-linux-amd64
GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/openCenter-linux-arm64
GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/openCenter-darwin-amd64
GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/openCenter-darwin-arm64

echo "Build complete. Binaries created:"
ls -la bin/openCenter-*
echo ""
echo "Version: ${VERSION}"
echo "Commit: ${GIT_COMMIT:0:7}"
echo "Branch: ${GIT_BRANCH}"
if [ -n "${GIT_TAG}" ]; then
  echo "Tag: ${GIT_TAG}"
fi
echo ""
echo "Note: Windows builds excluded due to platform-specific dependencies"
'''

# Build release binaries for all platforms with specified version and generate release notes
# Usage: mise run release <version> [publish-target]
# Example: mise run release v0.0.1-rc3
# Example: mise run release v0.0.1-rc3 opencenter-cloud/community-artifacts
release = '''
#!/usr/bin/env bash
set -e

# Check if version argument is provided
if [ -z "$1" ]; then
  echo "ERROR: Version argument required"
  echo "Usage: mise run release <version> [publish-target]"
  echo "Example: mise run release v0.0.1-rc3"
  echo "Example: mise run release v0.0.1-rc3 opencenter-cloud/community-artifacts"
  exit 1
fi

VERSION="$1"
PUBLISH_TARGET="${2:-rackerlabs/openCenter-cli}"

# Strip 'v' prefix if present for consistency
VERSION="${VERSION#v}"

echo "Building release binaries for version ${VERSION}..."
echo "Publish target: ${PUBLISH_TARGET}"
echo ""

# Get git information
GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

LDFLAGS="-X main.version=${VERSION} \
  -X main.gitCommit=${GIT_COMMIT} \
  -X main.gitBranch=${GIT_BRANCH} \
  -X main.gitTag=${VERSION} \
  -X main.buildDate=${BUILD_DATE}"

# Create release directory
mkdir -p bin/release

# Build for each supported platform (Unix-like systems only)
echo "Building Linux AMD64..."
GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/release/openCenter-${VERSION}-linux-amd64

echo "Building Linux ARM64..."
GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/release/openCenter-${VERSION}-linux-arm64

echo "Building macOS AMD64..."
GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/release/openCenter-${VERSION}-darwin-amd64

echo "Building macOS ARM64..."
GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/release/openCenter-${VERSION}-darwin-arm64

echo ""
echo "=== Release Build Complete ==="
echo ""
echo "Version: ${VERSION}"
echo "Commit: ${GIT_COMMIT:0:7}"
echo "Branch: ${GIT_BRANCH}"
echo "Build Date: ${BUILD_DATE}"
echo ""
echo "Release binaries created in bin/release/:"
ls -lh bin/release/
echo ""
echo "Supported platforms:"
echo "  - Linux AMD64"
echo "  - Linux ARM64"
echo "  - macOS AMD64 (Intel)"
echo "  - macOS ARM64 (Apple Silicon)"
echo ""
echo "Note: Windows builds are not currently supported due to platform-specific dependencies"
echo ""

# Generate release notes
echo "=== Generating Release Notes ==="
echo ""
mise run publish "${VERSION}" "${PUBLISH_TARGET}"

echo ""
echo "=== Release Complete ==="
echo ""
echo "Next steps:"
echo "  1. Review release notes in bin/release/RELEASE_NOTES_${VERSION}.md"
echo "  2. Test binaries on target platforms"
echo "  3. Create and push git tag:"
echo "     git tag -a v${VERSION} -m 'Release ${VERSION}'"
echo "     git push origin v${VERSION}"
echo ""
echo "  4. Create GitHub release using gh CLI (if installed):"
echo "     gh release create v${VERSION} \\"
echo "       --repo ${PUBLISH_TARGET} \\"
echo "       --title 'openCenter ${VERSION}' \\"
echo "       --notes-file bin/release/RELEASE_NOTES_${VERSION}.md \\"
echo "       --prerelease \\"
echo "       bin/release/openCenter-*"
echo ""
echo "     OR manually at: https://github.com/${PUBLISH_TARGET}/releases/new?tag=v${VERSION}"
'''

# Publish release to GitHub with auto-generated release notes
# Usage: mise run publish <version> [publish-target]
# Example: mise run publish 1.0.0-rc2
# Example: mise run publish 1.0.0-rc2 opencenter-cloud/community-artifacts
publish = '''
#!/usr/bin/env bash
set -e

# Check if version argument is provided
if [ -z "$1" ]; then
  echo "ERROR: Version argument required"
  echo "Usage: mise run publish <version> [publish-target]"
  echo "Example: mise run publish 1.0.0-rc2"
  echo "Example: mise run publish 1.0.0-rc2 opencenter-cloud/community-artifacts"
  exit 1
fi

VERSION="$1"
PUBLISH_TARGET="${2:-rackerlabs/openCenter-cli}"

# Strip 'v' prefix if present for consistency
VERSION="${VERSION#v}"
TAG="v${VERSION}"
RELEASE_DIR="bin/release"

echo "=== Generating Release Notes for ${VERSION} ==="
echo "Publish target: ${PUBLISH_TARGET}"
echo ""

# Get the last tag to generate changelog
LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
if [ -z "$LAST_TAG" ]; then
  echo "No previous tag found, generating full changelog..."
  COMMIT_RANGE="HEAD"
else
  echo "Generating changelog since ${LAST_TAG}..."
  COMMIT_RANGE="${LAST_TAG}..HEAD"
fi

# Generate release notes following documentation steering guidelines
RELEASE_NOTES_FILE="${RELEASE_DIR}/RELEASE_NOTES_${VERSION}.md"
mkdir -p "${RELEASE_DIR}"

cat > "$RELEASE_NOTES_FILE" << EOF
# openCenter ${VERSION}

Release ${VERSION} of openCenter CLI.

## Changes in This Release

EOF

# Extract and format feature commits
FEATURES=$(git log $COMMIT_RANGE --oneline --no-merges | grep -E "^[a-f0-9]+ feat" | sed 's/^[a-f0-9]* feat//' || echo "")
if [ -n "$FEATURES" ]; then
  echo "**New Features**" >> "$RELEASE_NOTES_FILE"
  echo "" >> "$RELEASE_NOTES_FILE"
  echo "$FEATURES" | while IFS= read -r line; do
    if [ -n "$line" ]; then
      echo "- $line" >> "$RELEASE_NOTES_FILE"
    fi
  done
  echo "" >> "$RELEASE_NOTES_FILE"
fi

# Extract and format fix commits
FIXES=$(git log $COMMIT_RANGE --oneline --no-merges | grep -E "^[a-f0-9]+ fix" | sed 's/^[a-f0-9]* fix//' || echo "")
if [ -n "$FIXES" ]; then
  echo "**Bug Fixes**" >> "$RELEASE_NOTES_FILE"
  echo "" >> "$RELEASE_NOTES_FILE"
  echo "$FIXES" | while IFS= read -r line; do
    if [ -n "$line" ]; then
      echo "- $line" >> "$RELEASE_NOTES_FILE"
    fi
  done
  echo "" >> "$RELEASE_NOTES_FILE"
fi

# Extract and format docs commits
DOCS=$(git log $COMMIT_RANGE --oneline --no-merges | grep -E "^[a-f0-9]+ docs" | sed 's/^[a-f0-9]* docs//' || echo "")
if [ -n "$DOCS" ]; then
  echo "**Documentation**" >> "$RELEASE_NOTES_FILE"
  echo "" >> "$RELEASE_NOTES_FILE"
  echo "$DOCS" | while IFS= read -r line; do
    if [ -n "$line" ]; then
      echo "- $line" >> "$RELEASE_NOTES_FILE"
    fi
  done
  echo "" >> "$RELEASE_NOTES_FILE"
fi

cat >> "$RELEASE_NOTES_FILE" << EOF
## Installation

Download the binary for your platform and move it to your PATH.

**Linux (x86_64)**
\`\`\`bash
curl -L https://github.com/${PUBLISH_TARGET}/releases/download/${TAG}/openCenter-${VERSION}-linux-amd64 -o openCenter
chmod +x openCenter
sudo mv openCenter /usr/local/bin/
\`\`\`

**Linux (ARM64)**
\`\`\`bash
curl -L https://github.com/${PUBLISH_TARGET}/releases/download/${TAG}/openCenter-${VERSION}-linux-arm64 -o openCenter
chmod +x openCenter
sudo mv openCenter /usr/local/bin/
\`\`\`

**macOS (Intel)**
\`\`\`bash
curl -L https://github.com/${PUBLISH_TARGET}/releases/download/${TAG}/openCenter-${VERSION}-darwin-amd64 -o openCenter
chmod +x openCenter
sudo mv openCenter /usr/local/bin/
\`\`\`

**macOS (Apple Silicon)**
\`\`\`bash
curl -L https://github.com/${PUBLISH_TARGET}/releases/download/${TAG}/openCenter-${VERSION}-darwin-arm64 -o openCenter
chmod +x openCenter
sudo mv openCenter /usr/local/bin/
\`\`\`

Check the installation:
\`\`\`bash
openCenter version
\`\`\`

## Platform Support

This release includes binaries for:
- Linux x86_64
- Linux ARM64
- macOS Intel
- macOS Apple Silicon

Windows is not supported in this release due to platform-specific file locking code.

## Known Issues

See the [issue tracker](https://github.com/${PUBLISH_TARGET}/issues) for current known issues.

## Full Changelog

Compare changes: https://github.com/${PUBLISH_TARGET}/compare/${LAST_TAG}...${TAG}
EOF

echo "✅ Release notes generated: $RELEASE_NOTES_FILE"
echo ""
cat "$RELEASE_NOTES_FILE"
echo ""
echo "=== Release Notes Complete ==="
echo ""
echo "File saved to: ${RELEASE_NOTES_FILE}"
'''

