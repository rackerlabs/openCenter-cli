apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
spec:
  releaseName: sealed-secrets
  interval: 30s
  driftDetection:
    mode: enabled
  targetNamespace: sealed-secrets
  chart:
    spec:
      chart: sealed-secrets
      version: 2.17.3
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: sealed-secrets-values-base
      valuesKey: hardened.yaml
    - kind: Secret
      name: sealed-secrets-values-override
      valuesKey: override.yaml
      optional: true
